syntax = "proto3";

package user;

option go_package = "./pb/user";

message UserEligibilityRequest {
    int64 user_id = 1;
    double amount_to_spend = 2;
}

message UserEligibilityResponse {
    bool is_valid = 1;
    string name = 2;
    bool balance_sufficient = 3;
    double current_balance = 4;
}

message UpdateBalanceRequest {
    int64 user_id = 1;
    double amount = 2;
    bool is_credit = 3;
}

message UpdateBalanceResponse {
    bool status = 1;
    string message = 2;
    double current_balance = 3;
}

service UserService {
    rpc ValidateUser (UserEligibilityRequest) returns (UserEligibilityResponse);
    rpc UpdateUserBalance (UpdateBalanceRequest) returns (UpdateBalanceResponse);
}