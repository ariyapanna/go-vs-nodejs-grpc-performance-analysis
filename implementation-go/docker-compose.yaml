services:
  user-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "50051:50051"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  ledger-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ledger-service/Dockerfile
    container_name: ledger-service
    ports:
      - "50052:50052"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  wallet-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: wallet-service/Dockerfile
    container_name: wallet-service
    ports:
      - "50053:50053"
    environment:
      - USER_SERVICE_ADDR=user-service:50051
      - LEDGER_SERVICE_ADDR=ledger-service:50052
    depends_on:
      - user-service
      - ledger-service
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M